<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <form id="form">
          <h2>Add Information</h2>
          <div class="parent" data-index="0">
            <input
              id="name"
              class="input"
              type="text"
              placeholder="Ex: John Smith"
              data-field="name"
            />
            <input
              id="email"
              class="input"
              type="email"
              placeholder="example@gmail.com"
              data-field="email"
            />
          </div>
        </form>
        <button id="btn">Add field</button>
      </div>
      <div class="right" id="exp"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
